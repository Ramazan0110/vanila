<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WeatherNow</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <main class="container">

    <header>
      <h1 class="logo">WeatherNow</h1>
      <button id="themeToggle"><span class="theme-icon">Dark</span></button>
    </header>

    <section class="search-section">
      <input type="text" id="cityInput" placeholder="Введите город..." autocomplete="off"/>
      <button id="searchBtn">Найти</button>
      <button id="geoBtn">GPS</button>
      <p id="errorMsg"></p>
    </section>

    <section id="historySection" style="display:none">
      <p class="history-label">Недавние:</p>
      <nav id="historyChips"></nav>
    </section>

    <section id="weatherCard" style="display:none">
      <h2 id="cityName">—</h2>
      <span id="weatherIcon"></span>
      <p class="temp"><span id="temp">—</span>°C</p>
      <p id="description">—</p>
      <ul class="details-grid">
        <li><span class="detail-label">Влажность</span><span id="humidity">—</span></li>
        <li><span class="detail-label">Ветер</span><span id="wind">—</span></li>
        <li><span class="detail-label">Ощущается</span><span id="feelsLike">—</span></li>
        <li><span class="detail-label">Видимость</span><span id="visibility">—</span></li>
      </ul>
    </section>

    <section id="forecastSection" style="display:none">
      <h3>Прогноз на 5 дней</h3>
      <ul id="forecastGrid"></ul>
    </section>

    <p id="loader" style="display:none">Загрузка...</p>

  </main>
  <script src="app.js"></script>
</body>
</html>
